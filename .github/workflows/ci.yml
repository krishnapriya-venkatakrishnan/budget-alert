name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check-scaffold:
    name: Check project is scaffolded
    runs-on: ubuntu-latest
    outputs:
      scaffolded: ${{ steps.check.outputs.scaffolded }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        run: |
          if [ -f "package.json" ]; then
            echo "scaffolded=true" >> $GITHUB_OUTPUT
          else
            echo "scaffolded=false" >> $GITHUB_OUTPUT
            echo "⚠️ No package.json found — skipping CI until project is scaffolded."
          fi

  ci:
    name: Type check, lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check-scaffold
    if: needs.check-scaffold.outputs.scaffolded == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for gitleaks

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript — type check
        run: npx tsc --noEmit

      - name: ESLint — lint
        run: npx eslint . --max-warnings 0

      - name: Vitest — unit tests
        run: pnpm test
        env:
          # Use test/mock values — real keys are never in CI env
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: npm audit — dependency security
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: gitleaks — secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # only needed for org-level scans

      - name: Next.js — production build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # SUPABASE_SERVICE_ROLE_KEY and OPENAI_API_KEY intentionally omitted —
          # build must succeed without runtime secrets (they are only needed at request time)
